<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 16px;
      width: 220px;
      background: #fff;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 14px;
      color: #111;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .label {
      font-size: 13px;
      color: #333;
    }
    .switch {
      position: relative;
      width: 40px;
      height: 22px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      inset: 0;
      background: #ccc;
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    input:checked + .slider {
      background: #16a34a;
    }
    input:checked + .slider::before {
      transform: translateX(18px);
    }
  </style>
</head>
<body>
  <h2>🏆 Skool Leaderboard</h2>
  <div class="row">
    <span class="label">Hide leaderboard</span>
    <label class="switch">
      <input type="checkbox" id="toggle">
      <span class="slider"></span>
    </label>
  </div>
  <script src="popup.js"></script>
</body>
</html>
